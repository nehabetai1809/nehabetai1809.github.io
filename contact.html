    :root {

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', sans-serif; font-size: 17px; line-height: 1.7; color: var(--ink); background: var(--bg); }

    nav { position: sticky; top: 0; z-index: 100; background: rgba(250,249,247,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--rule); }

    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
    .contact-item { display: flex; flex-direction: column; }
    .contact-item .label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .contact-item span, .contact-item a { font-size: 1rem; color: var(--ink); text-decoration: none; }
    .contact-item a:hover { color: var(--accent); }
